<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abastible Linares</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background-color: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .login-card { 
            background: white; 
            padding: 50px 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 100%; 
            max-width: 320px; 
        }
        h1 { color: #003399; font-size: 28px; margin-bottom: 30px; }
        .btn-google { 
            background-color: white; 
            border: 1px solid #dadce0; 
            color: #3c4043; 
            padding: 12px; 
            border-radius: 4px; 
            font-weight: 500; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            font-size: 16px;
        }
        .btn-google img { width: 18px; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>¡Bienvenido!</h1>
        <button class="btn-google" onclick="window.login()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Entrar con Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAizx3OXbUjzJjAtbp74HiUIUFlLguC4qc",
            authDomain: "control-de-pedidos-71c6b.firebaseapp.com",
            projectId: "control-de-pedidos-71c6b",
            storageBucket: "control-de-pedidos-71c6b.appspot.com",
            messagingSenderId: "367280386762",
            appId: "1:367280386762:web:a6f7b764d0d0c3a2f3f9f3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.login = function() {
            signInWithPopup(auth, provider)
                .then((result) => {
                    window.location.href = "pedidos.html";
                })
                .catch((error) => {
                    console.error("Error Code:", error.code);
                    if (error.code === 'auth/unauthorized-domain') {
                        alert("ERROR CRÍTICO: El dominio todavía no es reconocido por Firebase. Asegúrate de que 'abastiblegaslinares.github.io' esté en la lista de Dominios Autorizados en la consola de Firebase.");
                    } else {
                        alert("Error: " + error.message);
                    }
                });
        };
    </script>
</body>
</html>
