<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pedidos - Abastible Linares</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --naranja: #FF5000; --azul: #003399; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f7f6; color: #333; }
        nav { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo-text { color: var(--azul); font-weight: bold; font-size: 20px; }
        .btn-logout { background: #eee; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .main-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { color: var(--naranja); border-bottom: 2px solid var(--naranja); padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn-submit { background: var(--naranja); color: white; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        #loader { text-align: center; margin-top: 100px; font-size: 18px; color: var(--azul); font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader">Verificando acceso...</div>

    <div id="app-content" style="display: none;">
        <nav>
            <div class="logo-text">ABASTIBLE LINARES</div>
            <button class="btn-logout" onclick="logout()">Cerrar Sesión</button>
        </nav>

        <div class="main-container">
            <div class="card">
                <h2>Nuevo Pedido</h2>
                <div class="form-group">
                    <label>Cliente / Dirección</label>
                    <input type="text" placeholder="Ej: Calle Principal 123">
                </div>
                <div class="form-group">
                    <label>Tipo de Gas</label>
                    <select>
                        <option>Gas 11kg</option>
                        <option>Gas 15kg</option>
                        <option>Gas 45kg</option>
                    </select>
                </div>
                <button class="btn-submit">Registrar Pedido</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAizx3OXbUjzJjAtbp74HiUIUFlLguC4qc",
            authDomain: "control-de-pedidos-71c6b.firebaseapp.com",
            projectId: "control-de-pedidos-71c6b",
            storageBucket: "control-de-pedidos-71c6b.appspot.com",
            messagingSenderId: "367280386762",
            appId: "1:367280386762:web:a6f7b764d0d0c3a2f3f9f3"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Escuchar el estado de la sesión
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Usuario autenticado: mostrar contenido
                document.getElementById('loader').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
            } else {
                // Sin sesión: redirigir al login
                window.location.replace("index.html");
            }
        });

        function logout() {
            auth.signOut().then(() => {
                window.location.replace("index.html");
            });
        }
    </script>
</body>
</html>
